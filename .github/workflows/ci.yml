name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes
          POSTGRES_DB: hermeschain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hermes"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: cd backend && npm ci || cd backend && npm install

      - name: Build
        run: cd backend && npm run build

      - name: Test
        env:
          DATABASE_URL: postgresql://hermes:hermes@localhost:5432/hermeschain_test
          REDIS_URL: redis://localhost:6379
        run: cd backend && npm test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && (npm ci || npm install)
      - run: cd frontend && npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx prettier --check .github/workflows
