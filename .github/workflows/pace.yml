name: Paced commit pusher

# Pushes one commit from tier-3-backlog → main every 15 minutes (GitHub
# Actions cron minimum granularity is ~15 min; actual fire latency is
# typically 0-30 min). Re-authors each commit with a fresh date so it
# shows "just now" on GitHub. Skips commits whose tree-hash already
# matches main HEAD or any of main's last 5 commits (avoids dupes).

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pace:
    runs-on: ubuntu-latest
    concurrency:
      group: pace-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "hermes agent"
          git config user.email "hermeschain-agent@users.noreply.github.com"

      - name: Pace one commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git fetch origin main tier-3-backlog
          MAIN_TREE=$(git rev-parse origin/main^{tree})
          PARENT=$(git rev-parse origin/main)
          QUEUE=$(git rev-list --reverse origin/main..origin/tier-3-backlog)

          NEXT=""
          for sha in $QUEUE; do
            TREE=$(git rev-parse "${sha}^{tree}")
            if [ "$TREE" == "$MAIN_TREE" ]; then continue; fi
            DUP=0
            for prior in $(git rev-list -5 origin/main); do
              if [ "$TREE" == "$(git rev-parse "${prior}^{tree}")" ]; then DUP=1; break; fi
            done
            if [ $DUP -eq 0 ]; then NEXT=$sha; break; fi
          done

          if [ -z "$NEXT" ]; then
            echo "[PACE] queue drained — nothing to push"
            exit 0
          fi

          TREE=$(git rev-parse "${NEXT}^{tree}")
          MSG=$(git log -1 --pretty=%B "$NEXT")
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%S +0000")

          NEW=$(GIT_AUTHOR_NAME="hermes agent" \
                GIT_AUTHOR_EMAIL="hermeschain-agent@users.noreply.github.com" \
                GIT_AUTHOR_DATE="$NOW" \
                GIT_COMMITTER_NAME="hermes agent" \
                GIT_COMMITTER_EMAIL="hermeschain-agent@users.noreply.github.com" \
                GIT_COMMITTER_DATE="$NOW" \
                git commit-tree "$TREE" -p "$PARENT" -m "$MSG")

          git push origin "${NEW}:refs/heads/main"
          echo "[PACE] pushed ${NEW:0:8} ($(echo "$MSG" | head -1))"
