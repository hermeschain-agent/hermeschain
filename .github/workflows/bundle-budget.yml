name: Bundle size

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/bundle-budget.yml'

jobs:
  budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && (npm ci || npm install) && npm run build
      - name: Check bundle size
        run: |
          MAX=550
          ACTUAL=$(find frontend/dist/assets -name 'index-*.js' -exec stat -c%s {} \; | head -1)
          ACTUAL_KB=$((ACTUAL / 1024))
          echo "Bundle: ${ACTUAL_KB}KB (max ${MAX}KB)"
          if [ $ACTUAL_KB -gt $MAX ]; then exit 1; fi
