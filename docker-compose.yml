version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hermeschain
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "hermes"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    environment:
      DATABASE_URL: postgresql://hermes:hermes@postgres:5432/hermeschain
      REDIS_URL: redis://redis:6379
      AGENT_ROLE: web
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HERMES_MODEL: claude-haiku-4-5-20251001
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      NODE_ENV: development
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/data:/app/data

volumes:
  pg_data:
